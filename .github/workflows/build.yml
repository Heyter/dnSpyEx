name: Manual build and publish release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, например v1.0.0'
        required: true
        type: string
      release_name:
        description: 'Название релиза, можно оставить пустым'
        required: false
        type: string
      prerelease:
        description: 'Сделать prerelease'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  ARTIFACT_NAME: dnSpy-net-win64

jobs:
  build:
    name: Build artifact
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build dnSpy (net-x64)
        run: .\build.ps1 net-x64

      - name: Prepare artifact folders
        run: |
          New-Item -ItemType Directory -Path .\artifacts\package -Force > $null
          New-Item -ItemType Directory -Path .\artifacts\out -Force > $null

      - name: Find publish directory
        id: find_publish
        run: |
          $publishDir = Get-ChildItem `
            -Path .\dnSpy\dnSpy\bin\Release `
            -Directory `
            -Recurse |
            Where-Object { $_.FullName -like "*\win-x64\publish" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $publishDir) {
            throw "Publish directory not found under .\dnSpy\dnSpy\bin\Release"
          }

          "publish_dir=$publishDir" >> $env:GITHUB_OUTPUT
          Write-Host "Publish dir: $publishDir"

      - name: Copy build output
        run: |
          Copy-Item `
            -Path "${{ steps.find_publish.outputs.publish_dir }}\*" `
            -Destination .\artifacts\package `
            -Recurse `
            -Force

      - name: Create zip
        run: |
          $zipPath = ".\artifacts\out\dnSpy-net-win64-${{ inputs.release_tag }}.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive `
            -Path .\artifacts\package\* `
            -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: .\artifacts\out\dnSpy-net-win64-${{ inputs.release_tag }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./release-files

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.ref_name }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.release_tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ./release-files/dnSpy-net-win64-${{ inputs.release_tag }}.zip
